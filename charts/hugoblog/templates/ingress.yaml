{{- range .Values.sites }}
{{- $site := . }}
{{- $service := default dict $site.service }}
{{- $ingress := default dict $site.ingress }}
{{- if $ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hugoblog.siteFullname" (dict "root" $ "site" $site) }}
  labels:
    {{- include "hugoblog.siteLabels" (dict "root" $ "site" $site) | nindent 4 }}
  {{- with $ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with $ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "hugoblog.siteFullname" (dict "root" $ "site" $site) }}
                port:
                  number: {{ default $.Values.defaults.servicePort $service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
